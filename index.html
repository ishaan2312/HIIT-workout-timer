<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="description" content="Premium HIIT and circuit workout timer with voice coaching. Save custom workouts, track progress, and train with professional guidance.">
  <meta name="theme-color" content="#1a1a1a">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Workout Timer">
  <meta name="application-name" content="HIIT Workout Timer">
  <meta name="msapplication-TileColor" content="#ff6b35">
  <meta name="msapplication-config" content="./assets/browserconfig.xml">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  
  <!-- Manifest for PWA installation -->
  <link rel="manifest" href="./manifest.json">
  
  <!-- Favicon -->
  <link rel="icon" type="image/png" href="./assets/icons/icon-192.png">
  <link rel="apple-touch-icon" href="./assets/icons/icon-192.png">
  
  <!-- Stylesheet -->
  <link rel="stylesheet" href="./style.css">
  
  <title>Workout Timer - HIIT & Circuit Training</title>
</head>
<body>
  <div id="app">
    <div id="screenContainer"></div>
  </div>

  <!-- Scripts -->
  <script src="./storage.js"></script>
  <script src="./speech.js"></script>
  <script src="./timer.js"></script>
  <script src="./app.js"></script>

  <script>
    // Prevent double tap zoom
    document.addEventListener('touchend', function(event) {
      if (event.touches.length === 0) {
        event.preventDefault();
      }
    }, false);

    // Handle viewport height on mobile (prevents issues with address bar)
    const setViewportHeight = () => {
      const vh = window.innerHeight * 0.01;
      document.documentElement.style.setProperty('--vh', `${vh}px`);
    };

    setViewportHeight();
    window.addEventListener('resize', setViewportHeight);
    window.addEventListener('orientationchange', setViewportHeight);
  </script>
</body>
</html>
